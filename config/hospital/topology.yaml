# ============================================================================
# Lakeside Regional Medical Center — Network Topology
# ============================================================================
# Regional Medical Center (~500 beds) + 3 satellite facilities
#
# IP Scheme (designed for consistent trending & anomaly detection):
#   10.10.x.x  = Main Campus (LRMC)
#   10.20.x.x  = Satellite West  — Lakeside West Urgent Care & Family Medicine
#   10.30.x.x  = Satellite North — Lakeside North Cardiology/Oncology
#   10.40.x.x  = Satellite South — Lakeside South Primary Care
#   172.16.0.x  = WAN transit links (MPLS/SD-WAN)
#   203.0.113.x = Public-facing (MyChart, Interconnect)
#
# VLAN Strategy (per-site, consistent numbering):
#   VLAN 10  = Epic Application Tier (Citrix/Hyperspace hosts)
#   VLAN 20  = Clinical Workstations (nursing, physician)
#   VLAN 25  = Emergency Department
#   VLAN 30  = HL7 Interface Zone (Rhapsody/Bridges)
#   VLAN 40  = Medical Devices / IoMT (pumps, monitors, imaging)
#   VLAN 50  = DMZ (MyChart, Interconnect public)
#   VLAN 60  = Radiology / PACS
#   VLAN 70  = Voice / Nurse Call
#   VLAN 80  = Data Warehouse (Clarity/Caboodle)
#   VLAN 90  = Server Infrastructure (AD, DNS, DHCP)
#   VLAN 100 = Management (switch/firewall management)
#   VLAN 200 = Guest WiFi (patient/visitor)
#   VLAN 250 = Remote Access / VPN
# ============================================================================

