# ============================================================================
# Kansas City Regional Medical Center — Network Topology
# ============================================================================
# Regional Medical Center (~500 beds) + 3 satellite clinics
#
# Sites:
#   kcrmc-main  — Kansas City Regional Medical Center (Main Campus)
#   oak-clinic  — Oakley Rural Health & Specialty Outreach
#   wel-clinic  — Wellington Urgent Care & Family Medicine
#   bel-clinic  — Belleville Primary Care & Pediatrics
#   hq-dc       — HQ Data Center (Olathe) — Compute & Storage
#   branch-west — West Branch Office (Dodge City) — Remote Telehealth
#
# IP Scheme (designed for consistent trending & anomaly detection):
#   10.10.x.x   = Main Campus (KCRMC — Kansas City)
#   10.20.x.x   = Oakley Clinic
#   10.30.x.x   = Wellington Clinic
#   10.40.x.x   = Belleville Clinic
#   10.50.x.x   = HQ Data Center (Olathe)
#   10.60.x.x   = West Branch Office (Dodge City)
#   172.16.0.x   = WAN transit links (MPLS/SD-WAN)
#   203.0.113.x  = Public-facing (MyChart, Interconnect, VPN)
#
# VLAN Strategy (per-site, consistent numbering):
#   VLAN 10  = Epic Application Tier (Citrix/Hyperspace hosts)
#   VLAN 20  = Clinical Workstations (nursing, physician)
#   VLAN 25  = Emergency Department
#   VLAN 30  = HL7 Interface Zone (Rhapsody/Bridges)
#   VLAN 40  = Medical Devices / IoMT (pumps, monitors, imaging)
#   VLAN 50  = DMZ (MyChart, Interconnect public)
#   VLAN 60  = Radiology / PACS
#   VLAN 70  = Voice / Nurse Call
#   VLAN 80  = Data Warehouse (Clarity/Caboodle)
#   VLAN 90  = Server Infrastructure (AD, DNS, DHCP)
#   VLAN 100 = Management (switch/firewall management)
#   VLAN 200 = Guest WiFi (patient/visitor)
#   VLAN 250 = Remote Access / VPN
# ============================================================================

