    vendor: cisco_nxos
    role: core_switch
    management_ip: "10.0.1.1"
    site: dc-east
    interfaces:
      - { name: "Ethernet1/1", ip: "10.0.1.1", status: up }
      - { name: "Ethernet1/2", ip: "100.64.1.1", status: up }

  - hostname: dc-east-spine-02
