apiVersion: apps/v1
kind: Deployment
metadata:
  name: webui
  namespace: healthcare-gen
  labels:
    app: webui
    app.kubernetes.io/part-of: healthcare-observability-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webui
  template:
    metadata:
      labels:
        app: webui
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: webui
          image: vietregistry.azurecr.io/healthcare-gen/webui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: generator-config
            - secretRef:
                name: dt-credentials
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: webui
  namespace: healthcare-gen
spec:
  selector:
    app: webui
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
