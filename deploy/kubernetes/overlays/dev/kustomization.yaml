apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: dev-

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: webui
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: webui
                resources:
                  limits:
                    cpu: 250m
                    memory: 256Mi
    target:
      kind: Deployment
      name: webui
