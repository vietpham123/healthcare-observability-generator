apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: prod-

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: webui
      spec:
        replicas: 2
    target:
      kind: Deployment
      name: webui
